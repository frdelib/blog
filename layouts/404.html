<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    const path = window.location.pathname;

    if (path.startsWith("/blog/")) {
      const newPath = path.replace("/blog", "");
      window.location.href = "https://frdelib.org" + newPath;
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
